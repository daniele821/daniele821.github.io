<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../icons/info.png">
    <title>Document</title>
    <style>
        * {
            background: #181a1b;
            color: #e8e6e3;
            font-family: sans-serif;
            box-sizing: border-box;
        }

        body {
            font-size: 1em;
            margin: 1rem;
        }

        a:hover {
            color: #004daa;
        }

        a {
            color: #3391ff;
        }

        button {
            font-size: 1em;
            padding: 0.4em 1em;
            margin-bottom: 1em;
        }
    </style>
</head>

<body>
    <div id="ip"></div>
    <script>
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                console.log(data)
                let ipdiv = document.getElementById("ip")
                ipdiv.innerHTML = `
            <div class="ip-info-container">
                <h3>Your IP Information</h3>
                <table class="ip-info-table">
                    ${Object.entries(data)
                        .map(([key, value]) => `
                            <tr>
                                <td class="ip-info-key">${key}:</td>
                                <td class="ip-info-value">${value}</td>
                            </tr>
                        `)
                        .join('')}
                </table>
            </div>`
            })
            .catch(error => console.error("Error fetching IP:", error));
    </script>
</body>

</html>
