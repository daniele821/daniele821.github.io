<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../icons/info.png">
    <title>Document</title>
    <style>
        * {
            background: #181a1b;
            color: #e8e6e3;
            font-family: sans-serif;
            box-sizing: border-box;
        }

        body {
            font-size: 1em;
            margin: 1rem;
        }

        a:hover {
            color: #004daa;
        }

        a {
            color: #3391ff;
        }

        button {
            font-size: 1em;
            padding: 0.4em 1em;
            margin-bottom: 1em;
        }

        .name {
            display: inline-block;
            padding-right: 10px;
            font-weight: bold;
        }

        /* Add this to your existing CSS */
        .ip-info-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 2rem);
            /* Adjust based on your body margin */
            padding: 1rem;
        }

        .ip-info-container {
            background: #1e2021;
            border: 1px solid #2d2f31;
            border-radius: 4px;
            padding: 1.5rem;
            width: 100%;
            max-width: 600px;
            /* Adjust width as needed */
            margin: 0 auto;
            /* Additional centering */
        }

        .ip-info-container h3 {
            margin-top: 0;
            margin-bottom: 1rem;
            color: #e8e6e3;
            border-bottom: 1px solid #2d2f31;
            padding-bottom: 0.6rem;
            text-align: center;
        }

        .ip-info-table {
            width: 100%;
            border-collapse: collapse;
            margin: 0 auto;
        }

        .ip-info-table tr {
            border-bottom: 1px solid #2d2f31;
        }

        .ip-info-table tr:last-child {
            border-bottom: none;
        }

        .ip-info-key {
            padding: 0.5rem 0.5rem 0.5rem 0;
            color: #a8a095;
            font-weight: bold;
            width: 30%;
        }

        .ip-info-value {
            padding: 0.5rem 0;
            color: #e8e6e3;
            word-break: break-word;
        }
    </style>
</head>

<body>
    <div id="ip"></div>
    <script>
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                console.log(data)
                let ipdiv = document.getElementById("ip")
                ipdiv.innerHTML = `
            <div class="ip-info-container">
                <h3>Your IP Information</h3>
                <table class="ip-info-table">
                    ${Object.entries(data)
                        .map(([key, value]) => `
                            <tr>
                                <td class="ip-info-key">${key}:</td>
                                <td class="ip-info-value">${value}</td>
                            </tr>
                        `)
                        .join('')}
                </table>
            </div>`
            })
            .catch(error => console.error("Error fetching IP:", error));
    </script>
</body>

</html>
