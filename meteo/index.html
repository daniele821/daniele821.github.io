<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Full-Size Windy Map</title>
    <link rel="icon" type="image/png" href="../icons/meteo.png">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <div class="iframe-container">
        <iframe
            src="https://embed.windy.com/embed2.html?zoom=10&overlay=radar">
        </iframe>
    </div>
</body>

</html>
