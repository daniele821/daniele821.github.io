<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8" />
    <title>Personal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            background: #181a1b;
            color: #e8e6e3;
        }

        a:hover {
            color: #004daa;
        }

        a {
            color: #3391ff;
        }

        p.installers {
            display: inline-block;
            color: yellowgreen;
            margin-right: 10px;
        }
    </style>
</head>


<body>
    <p>
        Run the following to do install operations:
    </p>
    <p id="installer1" class="installers">
        sudo dnf --assumeyes install git
        TMP_DIR="$(mktemp -d)"
        REPO_DIR="${TMP_DIR}/dotfiles"
        git clone https://github.com/daniele821/dotfiles "${REPO_DIR}"
        git -C "$REPO_DIR" switch fedora-kde
        BRANCH= "${TMP_DIR}/dotfiles/autosaver" run
    </p>
    <button type="button" onclick="copy('installer1')">Copy</button>
</body>

<script>
    function copy(elementId) {
        const copyText = document.getElementById(elementId).textContent.trim();
        navigator.clipboard.writeText(copyText)
    }
</script>

</html>
