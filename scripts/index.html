<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8" />
    <title>Personal</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <style>
        * {
            background: #181a1b;
            color: #e8e6e3;
        }

        a:hover {
            color: #004daa;
        }

        a {
            color: #3391ff;
        }

        pre {
            display: inline-block;
        }
    </style>
</head>


<body>
    <p>
        run the following to do install operations
    </p>
    <pre id="installer1">
        wget -q -O - https://daniele821.github.io/scripts/downloads/installer.sh | bash -s - kubuntu init git reboot
    </pre>
    <button type="button" onclick="copy('installer1')">Copy</button>
    <br>
    <pre id="installer2">
        wget -q -O - https://daniele821.github.io/scripts/downloads/installer.sh | bash -s - fedora-kde init git reboot
    </pre>
    <button type="button" onclick="copy('installer2')">Copy</button>
    <h1>Preview</h1>
    <ul id="scripts"></ul>
    <script>
        const scripts = document.getElementById("scripts")
        fetch('scripts.json')
            .then(data => data.json())
            .then(data => {
                for (const fileName of data) {
                    scripts.innerHTML += `<li><a href="previews/${fileName}.html">${fileName} script</a></li>`
                }
            })
    </script>
</body>

<script>
    function copy(elementId) {
        const copyText = document.getElementById(elementId).textContent.trim();
        navigator.clipboard.writeText(copyText)
    }
</script>

</html>
